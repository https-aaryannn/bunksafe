<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <linearGradient id="checkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Squircle -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <!-- Shield Outline with Glow -->
  <path d="M 256 96 C 320 96 400 112 400 112 V 248 C 400 344 326 408 256 432 C 186 408 112 344 112 248 V 112 C 112 112 192 96 256 96 Z" 
        fill="none" 
        stroke="url(#shieldGrad)" 
        stroke-width="28" 
        stroke-linejoin="round"
        filter="url(#glow)" />

  <!-- Shield Solid Fill background -->
  <path d="M 256 120 C 310 120 376 134 376 134 V 248 C 376 328 314 384 256 404 C 198 384 136 328 136 248 V 134 C 136 134 202 120 256 120 Z" 
        fill="url(#shieldGrad)" 
        opacity="0.2" />

  <!-- Checkmark -->
  <path d="M 184 256 L 232 304 L 336 192" 
        fill="none" 
        stroke="url(#shieldGrad)" 
        stroke-width="36" 
        stroke-linecap="round" 
        stroke-linejoin="round" />
</svg>
